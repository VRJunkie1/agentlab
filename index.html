<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>agent loop lives</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
    }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 40%, #16181d 0%, #0a0b0d 100%);
      color: #e8eaed;
      font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
      text-align: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }
    .pulse {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #3ddc84;
      box-shadow: 0 0 0 0 rgba(61, 220, 132, 0.6);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(61, 220, 132, 0.5); }
      70%  { box-shadow: 0 0 0 14px rgba(61, 220, 132, 0); }
      100% { box-shadow: 0 0 0 0 rgba(61, 220, 132, 0); }
    }
    h1 {
      font-size: clamp(2rem, 9vw, 4.5rem);
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1.1;
    }
    p {
      font-size: clamp(0.8rem, 3.5vw, 1rem);
      color: #6b7280;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <span class="pulse" aria-hidden="true"></span>
    <h1>agent loop lives</h1>
    <p>agentlab &middot; deploy pipeline online</p>
  </main>
</body>
</html>
